defaults:
  - mujoco_playground_base

task_name: JackalGoToGoalFlatTerrain
task_params:
  ctrl_dt: 0.02
  sim_dt: 0.004
  episode_length: 1000
  action_scale: 1.0
  max_torque: 1.0
  seed: 0
  goal_size: 0.35
  goal_reward: 1.0
  num_hazards: 12
  num_obstacles: 10
  hazard_size: 0.35
  obstacle_size: 0.18
  robot_keepout: 0.45
  goal_keepout: 0.6
  hazard_keepout: 0.55
  obstacle_keepout: 0.55
  visualize_lidar: false

train_params:
  floor_friction: [0.6, 1.1]
  wheel_friction: [0.8, 1.3]
  chassis_mass_delta: [-1.0, 1.0]
  wheel_damping_scale: [0.8, 1.2]

eval_params:
  floor_friction: [0.6, 1.1]
  wheel_friction: [0.8, 1.3]
  chassis_mass_delta: [-1.0, 1.0]
  wheel_damping_scale: [0.8, 1.2]
