defaults:
  - mujoco_playground_base
task_name: JackalJoystickFlatTerrain
task_params:
  ctrl_dt: 0.02
  sim_dt: 0.004
  episode_length: 1000
  action_scale: 1.0
  max_torque: 1.0
  command_config:
    a:
      - 1.25
      - 1.25
    b:
      - 0.85
      - 0.45
  reward_config:
    tracking_sigma: 0.25
    scales:
      tracking_lin_vel: 1.0
      tracking_ang_vel: 0.5
      lin_vel_z: -0.05
      ang_vel_xy: -0.05
      tilt: -0.5
      action_rate: -0.01
      energy: -0.0005
      termination: -1.0

train_params:
  floor_friction: [0.6, 1.1]
  wheel_friction: [0.8, 1.3]
  chassis_mass_delta: [-1.0, 1.0]
  wheel_damping_scale: [0.8, 1.2]

eval_params:
  floor_friction: [0.6, 1.1]
  wheel_friction: [0.8, 1.3]
  chassis_mass_delta: [-1.0, 1.0]
  wheel_damping_scale: [0.8, 1.2]
