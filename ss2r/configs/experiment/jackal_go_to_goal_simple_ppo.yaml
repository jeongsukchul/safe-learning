# @package _global_
defaults:
  - override /environment: jackal_go_to_goal
  - override /agent: ppo
  - _self_

training:
  num_timesteps: 5000000
  train_domain_randomization: false
  eval_domain_randomization: false
  safe: true
  safety_budget: 25
  action_repeat: 1

agent:
  activation: swish
  penalizer:
    terminate: true
